<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบประปาหมู่บ้าน v14</title>
    
    <script>
        // 👇 นำ URL ที่ลงท้ายด้วย /exec จาก Google Apps Script มาใส่ตรงนี้ "แค่ที่เดียว"
        const API_URL = "https://script.google.com/macros/s/AKfycbwwsuG8Mc1N9xbi3PYyZpqi1TL90J5MYfjR_I3IkhknGLQ6CoknmxjuFO2IIBhI_ug/exec";
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Kanit', sans-serif;
            /* 🚫 ป้องกันการสไลด์เพื่อรีเฟรช (Pull-to-refresh) บนมือถือ */
            overscroll-behavior-y: contain; 
        }
        /* ซ่อนลูกศรในช่อง input แบบตัวเลข */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .anim-slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen w-screen overflow-hidden flex flex-col items-center justify-center">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-slate-100 flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="absolute inset-0 pointer-events-none overflow-hidden">
            <div class="absolute top-[-10%] right-[-10%] w-80 h-80 bg-blue-200/50 rounded-full blur-3xl"></div>
            <div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 bg-purple-200/50 rounded-full blur-3xl"></div>
        </div>

        <div class="relative z-10 w-full max-w-sm bg-white/80 backdrop-blur-xl rounded-[2.5rem] shadow-2xl border border-white/50 p-8 flex flex-col items-center text-center anim-slide-up">
            <div class="w-32 h-32 -mt-20 mb-6 bg-white rounded-full p-2 shadow-xl border-4 border-slate-50 overflow-hidden">
                <img src="https://raw.githubusercontent.com/ronarong64/IMG/refs/heads/main/%E0%B9%84%E0%B8%A1%E0%B9%88%E0%B8%A1%E0%B8%B5%E0%B8%9E%E0%B8%B4%E0%B9%89%E0%B8%99%E0%B8%AB%E0%B8%A5%E0%B8%B1%E0%B8%87.png" 
                     class="w-full h-full object-contain" alt="Logo">
            </div>
            
            <h1 class="text-2xl font-bold mb-1 text-slate-800">ระบบจัดเก็บค่าน้ำประปา</h1>
            <p class="text-xs text-slate-400 mb-8 font-medium bg-slate-100 px-3 py-1 rounded-full"><i class="fas fa-map-marker-alt text-blue-500 mr-1"></i> หมู่ที่ 2 บ้านหนองบัว</p>

            <div class="w-full relative mb-6">
                <input type="password" id="pin-input" placeholder="ป้อนรหัส PIN" maxlength="6" inputmode="numeric"
                       class="w-full h-16 bg-slate-50 border border-slate-200 rounded-2xl text-center text-3xl font-bold tracking-[0.5em] focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 outline-none transition-all placeholder:tracking-normal placeholder:font-normal placeholder:text-base">
            </div>

            <button onclick="submitLogin()" id="btn-login"
                    class="w-full h-16 bg-slate-900 text-white rounded-2xl font-bold text-lg shadow-xl shadow-slate-900/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                เข้าสู่ระบบ <i class="fas fa-arrow-right ml-1"></i>
            </button>

            <p id="error-msg" class="hidden mt-5 bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold border border-red-100 animate-pulse w-full">
                <i class="fas fa-times-circle mr-1"></i> รหัส PIN ไม่ถูกต้อง
            </p>
        </div>
        
        <div class="absolute bottom-6 text-center">
            <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">ผู้พัฒนาระบบ รณรงค์ อินทร์คง</p>
            <p class="text-[9px] text-slate-400 mt-1 font-mono">v14.0.0</p>
        </div>
    </div>

    <div id="main-screen" class="hidden fixed inset-0 flex flex-col bg-slate-50 w-full max-w-md mx-auto shadow-2xl overflow-hidden">
        
        <header class="bg-white/90 backdrop-blur-lg z-50 border-b border-slate-100 px-5 py-4 shrink-0 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white shadow-md">
                    <i class="fas fa-tint"></i>
                </div>
                <div>
                    <h2 class="font-bold text-slate-800 leading-none text-lg">ระบบประปา</h2>
                    <p class="text-[11px] text-slate-500 font-medium">หมู่ 2 หนองบัว</p>
                </div>
            </div>
            
            <div class="flex flex-col items-end text-right">
                <div class="flex items-center gap-1.5">
                    <span id="display-username" class="text-sm font-bold text-slate-700">Loading...</span>
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                </div>
                <span id="display-role" class="text-[10px] bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full font-bold uppercase mt-0.5 border border-slate-200 shadow-sm">Role</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto hide-scrollbar p-4 space-y-4 pb-24">
            
            <div class="relative w-full">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="ค้นหาบ้านเลขที่ หรือ ชื่อ..." 
                       class="w-full bg-white border border-slate-200 rounded-xl h-12 pl-11 pr-24 text-slate-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all font-medium text-sm shadow-sm">
                <div class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-slate-50 px-2.5 py-1 rounded-lg text-xs font-bold text-slate-500 border border-slate-100">
                    <span id="search-count">...</span>
                </div>
            </div>

            <div id="overdue-warning-banner" class="hidden bg-gradient-to-r from-red-500 to-rose-600 rounded-2xl p-4 shadow-lg shadow-red-500/30 text-white flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center animate-pulse"><i class="fas fa-exclamation-triangle text-xl"></i></div>
                    <div>
                        <h3 class="font-bold leading-tight">ค้างชำระเกินกำหนด!</h3>
                        <p class="text-xs text-red-100">จำนวน <span id="overdue-warning-count" class="font-bold text-white text-base">0</span> หลัง (เตรียมงดจ่ายน้ำ)</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="bg-white rounded-2xl p-3 shadow-sm border border-slate-100 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center flex-shrink-0"><i class="fas fa-clipboard-list"></i></div>
                    <div class="min-w-0"><p class="text-[11px] text-slate-400 font-medium">ยังไม่จดมิเตอร์</p><div id="dash-count-todo" class="text-lg font-bold text-slate-700 leading-none">0</div></div>
                </div>
                <div class="bg-white rounded-2xl p-3 shadow-sm border border-orange-100 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-orange-50 text-orange-500 flex items-center justify-center flex-shrink-0"><i class="fas fa-clock"></i></div>
                    <div class="min-w-0"><p class="text-[11px] text-slate-400 font-medium">รอชำระเงิน</p><div id="dash-count-waiting" class="text-lg font-bold text-orange-500 leading-none">0</div></div>
                </div>
                <div class="bg-white rounded-2xl p-3 shadow-sm border border-green-100 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-check-circle"></i></div>
                    <div class="min-w-0"><p class="text-[11px] text-slate-400 font-medium">ชำระเรียบร้อย</p><div id="dash-count-paid" class="text-lg font-bold text-green-600 leading-none">0</div></div>
                </div>
                <div class="bg-white rounded-2xl p-3 shadow-sm border border-red-100 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center flex-shrink-0"><i class="fas fa-exclamation-circle"></i></div>
                    <div class="min-w-0"><p class="text-[11px] text-slate-400 font-medium">ค้างชำระ</p><div id="dash-count-overdue" class="text-lg font-bold text-red-500 leading-none">0</div></div>
                </div>
            </div>

            <div class="flex justify-between items-end mt-2 px-1">
                <h3 class="font-bold text-slate-700 text-sm">รายชื่อบ้านทั้งหมด</h3>
            </div>
